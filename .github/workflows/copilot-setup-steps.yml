name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/copilot-setup-steps.yml"
  pull_request:
    paths:
      - ".github/workflows/copilot-setup-steps.yml"

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - name: Install Endor Labs CLI
        shell: bash
        run: |
          set -euo pipefail

          version="1.7.967"
          install_dir="${HOME}/.local/bin"
          mkdir -p "${install_dir}"

          case "$(uname -m)" in
            x86_64)
              arch="amd64"
              ;;
            aarch64|arm64)
              arch="arm64"
              ;;
            *)
              echo "Unsupported runner architecture: $(uname -m)" >&2
              exit 1
              ;;
          esac

          url="https://api.endorlabs.com/download/endorlabs/v${version}/binaries/endorctl_v${version}_linux_${arch}"
          curl --fail --location --retry 3 --retry-delay 5 --connect-timeout 20 --output "${install_dir}/endorctl" "${url}"
          chmod +x "${install_dir}/endorctl"

          echo "${install_dir}" >> "${GITHUB_PATH}"
          "${install_dir}/endorctl" --version
